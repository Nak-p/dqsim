name: Build WebGL and Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build WebGL + Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build WebGL
        run: |
          & "C:\Program Files\Unity\Hub\Editor\6000.4.4f1\Editor\Unity.exe" `
            -quit -batchmode `
            -projectPath "${{ github.workspace }}" `
            -buildMethod WebGLBuildScript.Build `
            -logFile "${{ github.workspace }}\build.log"
          if ($LASTEXITCODE -ne 0) {
            Get-Content "${{ github.workspace }}\build.log" -Tail 50
            exit 1
          }

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/WebGL/DQSim
